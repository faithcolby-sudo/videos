<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portal de Videos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #111; color: #fff; padding: 20px; }
    h1 { text-align: center; margin-bottom: 24px; }
    .lista { max-width: 600px; margin: 0 auto; }
    .item {
      background: #222;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 14px;
    }
    .item h3 { margin-bottom: 10px; color: #adf; }
    .link-box {
      background: #333;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 0.85em;
      word-break: break-all;
      color: #7ef;
      margin-bottom: 8px;
    }
    .item button {
      padding: 6px 14px;
      background: #0070f3;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .item button:hover { background: #005bb5; }
    .copiado { color: #4f4; font-size: 0.85em; margin-left: 8px; display: none; }
  </style>
</head>
<body>
  <h1>🎬 Mi Portal de Videos</h1>
  <div class="lista" id="lista">Cargando...</div>

  <script>
    const BASE = window.location.href.replace("index.html","").replace(/\/$/, "") + "/watch.html?v=";

    fetch("videos.json")
      .then(r => r.json())
      .then(videos => {
        const lista = document.getElementById("lista");
        lista.innerHTML = videos.map(v => `
          <div class="item">
            <h3>${v.titulo}</h3>
            <div class="link-box">${BASE + v.id}</div>
            <button onclick="copiar('${BASE + v.id}', 'cop-${v.id}')">📋 Copiar link</button>
            <span class="copiado" id="cop-${v.id}">¡Copiado!</span>
          </div>
        `).join("");
      });

    function copiar(link, spanId) {
      navigator.clipboard.writeText(link);
      const el = document.getElementById(spanId);
      el.style.display = "inline";
      setTimeout(() => el.style.display = "none", 2000);
    }
  </script>
</body>
</html>
