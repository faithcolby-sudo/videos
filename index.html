<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portal de Videos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    h1 { font-size: 1.4em; margin-bottom: 6px; color: #eee; }
    #titulo-video {
      font-size: 1.1em;
      margin-bottom: 14px;
      color: #adf;
      text-align: center;
    }
    #frame-container {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/9;
      background: #000;
    }
    #frame-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .nav {
      display: flex;
      gap: 20px;
      margin-top: 18px;
    }
    .nav button {
      padding: 10px 28px;
      font-size: 1em;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .nav button:hover { background: #555; }
    #contador {
      margin-top: 10px;
      color: #888;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <h1>Mi Portal de Videos</h1>
  <div id="titulo-video"></div>

  <div id="frame-container">
    <iframe id="iframe-video" allowfullscreen
      allow="autoplay; fullscreen"></iframe>
  </div>

  <div class="nav">
    <button onclick="cambiar(-1)">⬅ Anterior</button>
    <button onclick="cambiar(1)">Siguiente ➡</button>
  </div>
  <div id="contador"></div>

  <script>
    // ── PON AQUÍ TUS IFRAMES DIRECTOS ──────────────────────
    const videos = [
      {
        titulo: "Video 1",
        src: "https://boe.sx/embed/XXXXXXX"
      },
      {
        titulo: "Video 2",
        src: "https://boe.sx/embed/YYYYYYY"
      },
      {
        titulo: "Video 3",
        src: "https://boe.sx/embed/ZZZZZZZ"
      }
    ];
    // ────────────────────────────────────────────────────────

    let actual = 0;

    function cargar(i) {
      document.getElementById("titulo-video").textContent = videos[i].titulo;
      document.getElementById("iframe-video").src = videos[i].src;
      document.getElementById("contador").textContent =
        "Video " + (i + 1) + " de " + videos.length;
    }

    function cambiar(dir) {
      actual = (actual + dir + videos.length) % videos.length;
      cargar(actual);
    }

    cargar(0);
  </script>

</body>
</html>
